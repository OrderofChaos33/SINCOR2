<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{{ product.title }} - SINCOR Store</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-900 text-white min-h-screen flex items-center justify-center p-4">
  <div class="bg-gray-800 p-6 rounded-lg max-w-2xl w-full">
    <div class="flex items-start justify-between">
      <div>
        <h1 class="text-2xl font-bold text-green-400">{{ product.title }}</h1>
        <p class="text-gray-300 mt-2">{{ product.description }}</p>
      </div>
      <div class="text-right">
        <div class="text-xl font-semibold">${{ '%.2f' | format(product.price) }}</div>
        <button id="buyBtn" class="mt-4 bg-green-600 px-4 py-2 rounded">Buy Now</button>
      </div>
    </div>
    <div id="msg" class="mt-4 text-sm text-gray-300"></div>
  </div>

  <script>
    const buyBtn = document.getElementById('buyBtn');
    const msg = document.getElementById('msg');

    buyBtn.addEventListener('click', async () => {
      msg.textContent = 'Creating checkout...';
      const res = await fetch('/store/create', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ product_id: '{{ product.id }}' })
      });

      const data = await res.json();
      if (data.success) {
        msg.textContent = 'Redirecting to approval URL...';
        window.location = data.approval_url;
      } else {
        msg.textContent = 'Error: ' + (data.error || 'unknown');
      }
    });
  </script>
</body>
</html>
