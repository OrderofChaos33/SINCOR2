{# SINCOR social profiles — include after {% include "_social_links.html" %} #}
<style>
  .sincor-social {
    display: flex;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 18px;
  }
  .sincor-social-label {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted, #94a3b8);
    margin-right: 4px;
  }
  .sincor-social a {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 38px;
    height: 38px;
    border-radius: 10px;
    border: 1px solid rgba(139, 92, 246, 0.22);
    background: rgba(15, 22, 41, 0.65);
    color: var(--text-dim, #cbd5e1);
    text-decoration: none;
    transition: border-color 0.2s, color 0.2s, transform 0.2s, box-shadow 0.2s;
  }
  .sincor-social a:hover {
    border-color: rgba(6, 182, 212, 0.55);
    color: var(--cyan, #06b6d4);
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(139, 92, 246, 0.18);
  }
  .sincor-social svg {
    width: 18px;
    height: 18px;
    fill: currentColor;
  }
  .sincor-social--compact a {
    width: 34px;
    height: 34px;
    border-radius: 8px;
  }
  .sincor-social--compact svg {
    width: 16px;
    height: 16px;
  }
</style>
<div class="sincor-social{% if compact %} sincor-social--compact{% endif %}" role="navigation" aria-label="SINCOR social links">
  {% if show_label %}<span class="sincor-social-label">Connect</span>{% endif %}
