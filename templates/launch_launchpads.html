<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Launchpad outreach — SINCOR</title>
  <style>
    :root { --bg:#0a0a14; --panel:#12121f; --cyan:#22d3ee; --muted:#9ca3af; --text:#e5e7eb; --green:#34d399; }
    body { margin:0; background:var(--bg); color:var(--text); font-family:Inter,system-ui,sans-serif; }
    .wrap { max-width:1000px; margin:0 auto; padding:32px 16px; }
    h1 { font-size:28px; margin:0 0 8px; }
    .sub { color:var(--muted); margin-bottom:20px; }
    .card { background:var(--panel); border:1px solid rgba(255,255,255,.08); border-radius:14px; padding:18px; margin-bottom:14px; }
    pre { white-space:pre-wrap; font-size:12px; line-height:1.5; background:#0c0c18; padding:12px; border-radius:10px; }
    button { cursor:pointer; border:none; border-radius:10px; padding:8px 12px; font-weight:700; margin-right:6px; font-size:12px; }
    .ok { background:var(--green); color:#042f2e; }
    .mail { background:var(--cyan); color:#042f2e; }
    a { color:var(--cyan); }
    .hidden { display:none; }
    .login input { width:100%; box-sizing:border-box; margin:8px 0; padding:10px; border-radius:10px; border:1px solid rgba(255,255,255,.12); background:#0d0d18; color:var(--text); }
  </style>
</head>
<body>
<div class="wrap">
  <h1>Launchpad outreach</h1>
  <p class="sub">5 LBP venues · one-tap email · <a href="/launch/campaign">Campaign hub</a> · <a href="/launch/partners">Partners</a></p>
  <div id="login" class="card login hidden">
    <input id="email" type="email" placeholder="Admin email">
    <input id="password" type="password" placeholder="Password">
    <button class="ok" onclick="doLogin()">Sign in</button>
  </div>
  <div id="main" class="hidden">
    <div id="stats" class="sub"></div>
    <div id="due"></div>
  </div>
</div>
<script>
const TOKEN_KEY = 'sincor_admin_token';
function authHeaders() {
  const t = sessionStorage.getItem(TOKEN_KEY);
  return t ? { 'Authorization': 'Bearer ' + t, 'Content-Type': 'application/json' } : {};
}
async function doLogin() {
  const res = await fetch('/api/auth/login', { method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ email: document.getElementById('email').value, password: document.getElementById('password').value }) });
  const d = await res.json();
  if (res.ok) { sessionStorage.setItem(TOKEN_KEY, d.access_token); load(); }
}
async function mark(id) {
  await fetch('/api/launch/launchpads/' + id, { method:'POST', headers: authHeaders(), body: JSON.stringify({ status:'contacted' }) });
  load();
}
async function load() {
  const res = await fetch('/api/launch/launchpads', { headers: authHeaders() });
  if (res.status === 401 || res.status === 403) {
    document.getElementById('login').classList.remove('hidden');
    return;
  }
  document.getElementById('login').classList.add('hidden');
  document.getElementById('main').classList.remove('hidden');
  const data = await res.json();
  const s = data.summary || {};
  document.getElementById('stats').textContent = `Total: ${s.total} · Status: ${JSON.stringify(s.by_status||{})}`;
  document.getElementById('due').innerHTML = (data.due||[]).map(lp => `
    <div class="card">
      <strong>${lp.name}</strong> (${lp.tier}) — ${lp.status}
      <div class="sub">${lp.contact_method}: <a href="${lp.contact_url}" target="_blank">${lp.contact_url}</a></div>
      ${lp.mailto ? `<a class="mail" href="${lp.mailto}" style="display:inline-block;padding:8px 12px;border-radius:10px;text-decoration:none;font-weight:700;margin:8px 0">Send email</a>` : ''}
      <pre>${lp.email_body||''}</pre>
      <button class="ok" onclick="mark('${lp.id}')">Mark contacted</button>
    </div>`).join('');
}
load();
</script>
</body>
</html>
