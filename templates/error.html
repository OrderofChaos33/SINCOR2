<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ code }} - {{ title }} | SINCOR</title>
    <link rel="icon" type="image/svg+xml" href="/static/sincor_favicon.png">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        * { font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #0c0c0c 0%, #1a1a2e 50%, #0c0c0c 100%); }
        .glass { background: rgba(255,255,255,0.05); -webkit-backdrop-filter: blur(20px); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center text-white p-6">
    <div class="glass rounded-3xl p-12 max-w-lg w-full text-center">
        <div class="text-8xl font-black mb-4 bg-gradient-to-r from-purple-400 to-pink-400 bg-clip-text text-transparent">
            {{ code }}
        </div>
        <h1 class="text-2xl font-bold mb-4">{{ title }}</h1>
        <p class="text-gray-400 mb-8 leading-relaxed">{{ message }}</p>
        <div class="flex flex-col sm:flex-row gap-3 justify-center">
            <a href="/" class="bg-gradient-to-r from-purple-600 to-blue-500 px-8 py-3 rounded-xl font-bold hover:opacity-90 transition">
                Go Home
            </a>
            <a href="/buy" class="glass px-8 py-3 rounded-xl font-bold hover:bg-white/10 transition border border-white/20">
                Browse Products
            </a>
        </div>
        <p class="text-gray-600 text-sm mt-8">Need help? <a href="mailto:support@getsincor.com" class="text-purple-400 hover:underline">support@getsincor.com</a></p>
    </div>
</body>
</html>
