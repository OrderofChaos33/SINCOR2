<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SINC Agent Marketplace | Rent AI Bots</title>
    <meta name="description" content="Rent AI agents for tasks. Earn SINC by providing services or rent bots for automation.">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #8b5cf6;
            --accent: #06b6d4;
            --success: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
            --dark: #0f0f23;
            --darker: #070714;
            --card: rgba(255, 255, 255, 0.03);
            --card-hover: rgba(255, 255, 255, 0.06);
            --border: rgba(255, 255, 255, 0.08);
            --text: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --text-muted: rgba(255, 255, 255, 0.4);
            --gradient-1: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #06b6d4 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--darker);
            color: var(--text);
            min-height: 100vh;
            padding-top: 80px; /* Account for fixed header */
        }

        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: rgba(7, 7, 20, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
        }

        .logo {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 1.5rem;
            color: var(--text);
            text-decoration: none;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .nav-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .nav-link:hover, .nav-link.active {
            color: var(--text);
        }

        .connect-btn {
            margin-left: 1rem;
        }

        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(139, 92, 246, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 40% 80%, rgba(6, 182, 212, 0.15) 0%, transparent 50%);
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
        
        header {
            padding: 24px 0;
            border-bottom: 1px solid var(--border);
        }
        
        .logo {
            font-size: 24px;
            font-weight: 700;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-decoration: none;
        }

        .hero {
            padding: 80px 0;
            text-align: center;
        }
        
        .hero h1 {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 16px;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .hero p {
            font-size: 20px;
            color: var(--text-secondary);
            margin-bottom: 40px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .marketplace-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
            margin-bottom: 60px;
        }
        
        .agent-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            transition: all 0.3s;
        }
        
        .agent-card:hover {
            background: var(--card-hover);
            transform: translateY(-4px);
            border-color: var(--primary);
        }
        
        .agent-header {
            display: flex;
            align-items: center;
            margin-bottom: 16px;
        }
        
        .agent-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: var(--gradient-1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-right: 16px;
        }
        
        .agent-title {
            font-size: 18px;
            font-weight: 600;
        }
        
        .agent-category {
            color: var(--text-secondary);
            font-size: 14px;
        }
        
        .agent-description {
            color: var(--text-secondary);
            margin-bottom: 20px;
            line-height: 1.5;
        }
        
        .agent-stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        
        .stat {
            text-align: center;
        }
        
        .stat-value {
            font-size: 16px;
            font-weight: 600;
            color: var(--primary);
        }
        
        .stat-label {
            color: var(--text-muted);
            font-size: 12px;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            width: 100%;
        }
        
        .btn-primary {
            background: var(--gradient-1);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.3);
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text);
            border: 1px solid var(--border);
        }
        
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .filter-section {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 40px;
        }
        
        .filter-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 16px;
        }
        
        .filter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
        }
        
        .filter-btn {
            padding: 8px 16px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .filter-btn:hover, .filter-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .marketplace-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 24px;
        }

        .agent-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            transition: all 0.3s ease;
        }

        .agent-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
            border-color: var(--primary);
        }

        .agent-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 16px;
        }

        .agent-icon {
            width: 48px;
            height: 48px;
            background: var(--gradient-1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .agent-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .agent-category {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .agent-description {
            color: var(--text-secondary);
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .agent-features {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
        }

        .feature-tag {
            background: rgba(99, 102, 241, 0.1);
            color: var(--primary);
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }

        .agent-stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        
        .stat {
            text-align: center;
        }
        
        .stat-value {
            font-size: 16px;
            font-weight: 600;
            color: var(--primary);
        }
        
        .stat-label {
            color: var(--text-muted);
            font-size: 12px;
        }

        @media (max-width: 768px) {
            .hero h1 { font-size: 36px; }
            .hero p { font-size: 16px; }
            .marketplace-grid { grid-template-columns: 1fr; }
            .filter-grid { grid-template-columns: repeat(2, 1fr); }
        }

        /* Subscription Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: var(--darker);
            margin: 5% auto;
            padding: 0;
            border: 1px solid var(--border);
            border-radius: 16px;
            width: 90%;
            max-width: 800px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px;
            border-bottom: 1px solid var(--border);
        }

        .modal-header h2 {
            margin: 0;
            font-size: 24px;
            font-weight: 600;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 28px;
            cursor: pointer;
            padding: 0;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-body {
            padding: 24px;
        }

        .subscription-plans {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .plan-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            text-align: center;
            transition: all 0.3s;
        }

        .plan-card:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
        }

        .plan-card.recommended {
            border-color: var(--primary);
            position: relative;
        }

        .plan-card.recommended::before {
            content: 'Most Popular';
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--primary);
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }

        .plan-name {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .plan-price {
            font-size: 32px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 16px;
        }

        .plan-price span {
            font-size: 16px;
            color: var(--text-secondary);
        }

        .plan-discount {
            color: var(--success);
            font-weight: 600;
            margin-bottom: 16px;
        }

        .plan-features {
            list-style: none;
            padding: 0;
            margin-bottom: 24px;
        }

        .plan-features li {
            color: var(--text-secondary);
            margin-bottom: 8px;
            font-size: 14px;
        }

        .plan-features li::before {
            content: '✓';
            color: var(--success);
            margin-right: 8px;
        }

        .btn-subscribe {
            width: 100%;
            padding: 12px;
            background: var(--gradient-1);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-subscribe:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .current-subscription {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
        }

        .subscription-info {
            margin-bottom: 20px;
        }

        .subscription-detail {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .subscription-label {
            color: var(--text-secondary);
        }

        .subscription-value {
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    
    <header>
        <nav class="container">
            <a href="/" class="logo">SINC</a>
            <div class="nav-links">
                <a href="/" class="nav-link">Home</a>
                <a href="/staking" class="nav-link">Staking</a>
                <a href="/marketplace" class="nav-link active">Marketplace</a>
                <button class="btn btn-secondary subscription-btn" id="subscription-btn">Subscriptions</button>
                <button class="btn btn-primary connect-btn" id="connect-wallet">Connect Wallet</button>
            </div>
        </nav>
    </header>
    
    <main class="container">
        <section class="hero">
            <h1>AI Agent Marketplace</h1>
            <p>Rent intelligent agents for tasks or offer your services. Earn SINC tokens through automation.</p>
        </section>
        
        <section class="filter-section">
            <h2 class="filter-title">Browse Agents</h2>
            <div class="filter-grid">
                <button class="filter-btn active">All</button>
                <button class="filter-btn">Content</button>
                <button class="filter-btn">Analytics</button>
                <button class="filter-btn">Social</button>
                <button class="filter-btn">Marketing</button>
                <button class="filter-btn">Support</button>
                <button class="filter-btn">Development</button>
            </div>
        </section>
        
        <section class="marketplace-grid">
            <!-- Agents will be loaded dynamically -->
        </section>
    </main>

    <!-- Subscription Modal -->
    <div class="modal" id="subscription-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>SINC Subscription Plans</h2>
                <button class="modal-close" id="subscription-modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <div class="subscription-plans" id="subscription-plans">
                    <!-- Plans will be loaded dynamically -->
                </div>
                <div class="current-subscription" id="current-subscription" style="display: none;">
                    <h3>Your Current Subscription</h3>
                    <div class="subscription-info" id="subscription-info"></div>
                    <button class="btn btn-error" id="cancel-subscription-btn">Cancel Subscription</button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <script>
        // DOM Elements
        const agentsGrid = document.querySelector('.marketplace-grid');
        const filterButtons = document.querySelectorAll('.filter-btn');
        const rentButtons = document.querySelectorAll('.btn-primary');

        let userAddress = null;
        let currentAgents = [];

        // Connect Wallet Function
        async function connectWallet() {
            if (typeof window.ethereum !== 'undefined') {
                try {
                    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    userAddress = accounts[0];
                    handleConnect(userAddress);
                } catch (error) {
                    console.error(error);
                    alert('Failed to connect wallet');
                }
            } else {
                alert('Please install MetaMask or another Web3 wallet');
            }
        }

        // Handle successful connection
        function handleConnect(address) {
            const shortAddr = `${address.substring(0, 6)}...${address.substring(38)}`;
            const connectBtn = document.getElementById('connect-wallet');
            if (connectBtn) {
                connectBtn.textContent = shortAddr;
            }
            console.log('Wallet connected:', address);
        }

        // Load agents from API
        async function loadAgents(category = 'All') {
            try {
                const response = await fetch(`/api/marketplace/agents?category=${category}`);
                const result = await response.json();

                if (result.success) {
                    currentAgents = result.agents;
                    renderAgents(result.agents);
                } else {
                    console.error('Failed to load agents:', result.error);
                }
            } catch (error) {
                console.error('Error loading agents:', error);
            }
        }

        // Render agents in the grid
        function renderAgents(agents) {
            agentsGrid.innerHTML = '';

            agents.forEach(agent => {
                const agentCard = document.createElement('div');
                agentCard.className = 'agent-card';
                agentCard.innerHTML = `
                    <div class="agent-header">
                        <h3 class="agent-name">${agent.name}</h3>
                        <div class="agent-rating">
                            <span class="stars">★★★★★</span>
                            <span class="rating-value">${agent.rating}</span>
                        </div>
                    </div>
                    <p class="agent-description">${agent.description}</p>
                    <div class="agent-features">
                        ${agent.features.map(feature => `<span class="feature-tag">${feature}</span>`).join('')}
                    </div>
                    <div class="agent-stats">
                        <div class="stat">
                            <span class="stat-value">${agent.users}</span>
                            <span class="stat-label">Users</span>
                        </div>
                        <div class="stat">
                            <span class="stat-value">${agent.price_per_hour}</span>
                            <span class="stat-label">SINC/hr</span>
                        </div>
                    </div>
                    <button class="btn btn-primary" data-agent-id="${agent.id}">Rent Agent</button>
                `;

                agentsGrid.appendChild(agentCard);
            });

            // Re-attach event listeners
            attachRentListeners();
        }

        // Attach event listeners to rent buttons
        function attachRentListeners() {
            document.querySelectorAll('.btn-primary').forEach(btn => {
                btn.addEventListener('click', function() {
                    const agentId = this.getAttribute('data-agent-id');
                    rentAgent(agentId);
                });
            });
        }

        // Rent an agent
        async function rentAgent(agentId) {
            if (!userAddress) {
                alert('Please connect your wallet first');
                return;
            }

            const agent = currentAgents.find(a => a.id === agentId);
            if (!agent) return;

            const hours = prompt(`How many hours do you want to rent ${agent.name}? (1-168 hours)`, '1');
            if (!hours) return;

            const hoursNum = parseInt(hours);
            if (isNaN(hoursNum) || hoursNum < 1 || hoursNum > 168) {
                alert('Please enter a valid number of hours (1-168)');
                return;
            }

            const cost = agent.price_per_hour * hoursNum;
            const confirmMsg = `Rent ${agent.name} for ${hoursNum} hours?\nCost: ${cost} SINC\n\n${agent.description}`;

            if (!confirm(confirmMsg)) return;

            try {
                const response = await fetch('/api/marketplace/rent', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        agent_id: agentId,
                        address: userAddress,
                        hours: hoursNum
                    })
                });

                const result = await response.json();

                if (result.success) {
                    alert(result.message);
                } else {
                    alert(result.error);
                }

            } catch (error) {
                console.error('Rental error:', error);
                alert('Network error. Please try again.');
            }
        }

        // Filter functionality
        filterButtons.forEach(btn => {
            btn.addEventListener('click', function() {
                filterButtons.forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                const category = this.textContent;
                loadAgents(category);
            });
        });

        // Initialize
        loadAgents();

        // Check if already connected
        if (typeof window.ethereum !== 'undefined') {
            window.ethereum.request({ method: 'eth_accounts' })
                .then(accounts => {
                    if (accounts.length > 0) {
                        userAddress = accounts[0];
                        handleConnect(userAddress);
                    }
                })
                .catch(console.error);
        }

        // Add connect wallet button to nav
        const connectBtn = document.getElementById('connect-wallet');
        if (connectBtn) {
            connectBtn.addEventListener('click', connectWallet);
        }

        // Subscription Modal Functionality
        const subscriptionBtn = document.getElementById('subscription-btn');
        const subscriptionModal = document.getElementById('subscription-modal');
        const subscriptionModalClose = document.getElementById('subscription-modal-close');
        const subscriptionPlans = document.getElementById('subscription-plans');
        const currentSubscription = document.getElementById('current-subscription');
        const subscriptionInfo = document.getElementById('subscription-info');
        const cancelSubscriptionBtn = document.getElementById('cancel-subscription-btn');

        // Open subscription modal
        subscriptionBtn.addEventListener('click', () => {
            if (!userAddress) {
                alert('Please connect your wallet first');
                return;
            }
            loadSubscriptionData();
            subscriptionModal.style.display = 'block';
        });

        // Close subscription modal
        subscriptionModalClose.addEventListener('click', () => {
            subscriptionModal.style.display = 'none';
        });

        // Close modal when clicking outside
        window.addEventListener('click', (event) => {
            if (event.target === subscriptionModal) {
                subscriptionModal.style.display = 'none';
            }
        });

        // Load subscription data
        async function loadSubscriptionData() {
            try {
                // Load plans
                const plansResponse = await fetch('/api/marketplace/subscription-plans');
                const plansResult = await plansResponse.json();

                // Load user's subscription
                const userSubResponse = await fetch('/api/marketplace/user-subscription', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ address: userAddress })
                });
                const userSubResult = await userSubResponse.json();

                if (plansResult.success) {
                    renderSubscriptionPlans(plansResult.plans);
                }

                if (userSubResult.success && userSubResult.subscription) {
                    renderCurrentSubscription(userSubResult.subscription);
                    currentSubscription.style.display = 'block';
                } else {
                    currentSubscription.style.display = 'none';
                }

            } catch (error) {
                console.error('Error loading subscription data:', error);
            }
        }

        // Render subscription plans
        function renderSubscriptionPlans(plans) {
            subscriptionPlans.innerHTML = '';

            Object.entries(plans).forEach(([planKey, plan]) => {
                const planCard = document.createElement('div');
                planCard.className = `plan-card ${planKey === 'pro' ? 'recommended' : ''}`;

                planCard.innerHTML = `
                    <h3 class="plan-name">${plan.name}</h3>
                    <div class="plan-price">${plan.price_monthly} <span>SINC/month</span></div>
                    <div class="plan-discount">${plan.discount_percent}% discount on rentals</div>
                    <ul class="plan-features">
                        ${plan.features.map(feature => `<li>${feature}</li>`).join('')}
                    </ul>
                    <button class="btn-subscribe" data-plan="${planKey}">Subscribe</button>
                `;

                subscriptionPlans.appendChild(planCard);
            });

            // Attach subscribe button listeners
            document.querySelectorAll('.btn-subscribe').forEach(btn => {
                btn.addEventListener('click', function() {
                    const planType = this.getAttribute('data-plan');
                    subscribeToPlan(planType);
                });
            });
        }

        // Render current subscription
        function renderCurrentSubscription(subscription) {
            subscriptionInfo.innerHTML = `
                <div class="subscription-detail">
                    <span class="subscription-label">Plan:</span>
                    <span class="subscription-value">${subscription.plan_name}</span>
                </div>
                <div class="subscription-detail">
                    <span class="subscription-label">Discount:</span>
                    <span class="subscription-value">${subscription.discount_percent}%</span>
                </div>
                <div class="subscription-detail">
                    <span class="subscription-label">Next Renewal:</span>
                    <span class="subscription-value">${new Date(subscription.end_date).toLocaleDateString()}</span>
                </div>
                <div class="subscription-detail">
                    <span class="subscription-label">Auto-renew:</span>
                    <span class="subscription-value">${subscription.auto_renew ? 'Yes' : 'No'}</span>
                </div>
            `;
        }

        // Subscribe to a plan
        async function subscribeToPlan(planType) {
            if (!confirm(`Subscribe to ${planType} plan? This will charge your wallet.`)) {
                return;
            }

            try {
                const response = await fetch('/api/marketplace/subscribe', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        address: userAddress,
                        plan_type: planType
                    })
                });

                const result = await response.json();

                if (result.success) {
                    alert(result.message);
                    loadSubscriptionData(); // Refresh the modal
                } else {
                    alert(result.error);
                }

            } catch (error) {
                console.error('Subscription error:', error);
                alert('Network error. Please try again.');
            }
        }

        // Cancel subscription
        cancelSubscriptionBtn.addEventListener('click', async () => {
            if (!confirm('Are you sure you want to cancel your subscription?')) {
                return;
            }

            try {
                const response = await fetch('/api/marketplace/cancel-subscription', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ address: userAddress })
                });

                const result = await response.json();

                if (result.success) {
                    alert(result.message);
                    loadSubscriptionData(); // Refresh the modal
                } else {
                    alert(result.error);
                }

            } catch (error) {
                console.error('Cancel subscription error:', error);
                alert('Network error. Please try again.');
            }
        });
    </script>
</body>
</html>
