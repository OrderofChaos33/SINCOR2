<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SINCOR Autonomous Swarm Deck</title>
  <meta name="description" content="SINCOR2 Autonomous Swarm — 15-slide technical deck. 42 agents, multi-agent OS, Base chain economy.">
  <link rel="icon" type="image/png" href="/static/sincor_favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#0a0e27; --purple:#8b5cf6; --cyan:#06b6d4; --text:#f1f5f9; --muted:#94a3b8; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--bg); color:var(--text); font-family:'Plus Jakarta Sans',sans-serif; min-height:100vh; overflow:hidden; }
    .top { position:fixed; top:0; left:0; right:0; z-index:20; display:flex; justify-content:space-between; align-items:center; padding:12px 20px; background:rgba(10,14,39,.92); border-bottom:1px solid rgba(139,92,246,.25); backdrop-filter:blur(12px); gap:12px; }
    .top a { color:var(--cyan); text-decoration:none; font-weight:600; font-size:14px; white-space:nowrap; }
    .top-title { font-size:13px; color:var(--muted); font-weight:600; letter-spacing:.04em; text-transform:uppercase; }
    .progress { flex:1; max-width:360px; height:4px; background:rgba(255,255,255,.1); border-radius:4px; overflow:hidden; }
    .progress > div { height:100%; background:linear-gradient(90deg,var(--purple),var(--cyan)); width:0%; transition:width .35s ease; }
    .stage { height:100vh; display:flex; align-items:center; justify-content:center; padding:72px 20px 140px; }
    .frame { width:min(1100px, 96vw); aspect-ratio:16/9; border-radius:12px; overflow:hidden; box-shadow:0 24px 80px rgba(0,0,0,.55), 0 0 0 1px rgba(255,255,255,.08); background:#f4f4f5; }
    .frame img { width:100%; height:100%; object-fit:contain; display:block; background:#f4f4f5; }
    .thumbs { position:fixed; bottom:0; left:0; right:0; z-index:20; background:rgba(10,14,39,.95); border-top:1px solid rgba(139,92,246,.2); padding:10px 16px 14px; display:flex; gap:8px; overflow-x:auto; scrollbar-width:thin; }
    .thumbs button { flex:0 0 auto; border:2px solid transparent; border-radius:6px; padding:0; background:none; cursor:pointer; opacity:.55; transition:opacity .2s, border-color .2s, transform .2s; }
    .thumbs button:hover { opacity:.85; }
    .thumbs button.active { opacity:1; border-color:var(--cyan); transform:translateY(-2px); }
    .thumbs img { width:88px; height:50px; object-fit:cover; display:block; border-radius:4px; }
    .nav-hint { position:fixed; bottom:78px; left:50%; transform:translateX(-50%); color:var(--muted); font-size:12px; pointer-events:none; }
    .btns { position:fixed; bottom:78px; right:20px; display:flex; gap:8px; z-index:21; }
    .btns button { background:rgba(139,92,246,.25); border:1px solid var(--purple); color:var(--text); padding:8px 16px; border-radius:8px; cursor:pointer; font-weight:600; font-size:13px; }
    .btns button:hover { background:var(--purple); }
    #counter { font-size:12px; color:var(--muted); font-family:'JetBrains Mono',monospace; white-space:nowrap; }
  </style>
</head>
<body>
<div class="top">
  <a href="/">← SINCOR</a>
  <span class="top-title">Autonomous Swarm Deck</span>
  <div class="progress"><div id="bar"></div></div>
  <span id="counter">1 / 15</span>
</div>

<div class="stage" id="stage">
  <div class="frame">
    <img id="slide" src="/static/docs/swarm/slide-01.png" alt="The Future of Autonomous Work — 42 Agents. Zero Humans. Infinite Scale.">
  </div>
</div>

<div class="nav-hint">← → keys · swipe · click thumbnails</div>
<div class="btns">
  <button type="button" id="prev">Prev</button>
  <button type="button" id="next">Next</button>
</div>

<div class="thumbs" id="thumbs" aria-label="Slide thumbnails"></div>

<script>
(function () {
  const slides = [
    { src: '/static/docs/swarm/slide-01.png', alt: 'The Future of Autonomous Work — 42 Agents. Zero Humans. Infinite Scale.' },
    { src: '/static/docs/swarm/slide-02.png', alt: 'Beyond Chatbots: The Multi-Agent Operating System' },
    { src: '/static/docs/swarm/slide-03.png', alt: 'The Core Intelligence Trinity — Cor-tecs Brain, Agency Kernel, Swarm Coordination' },
    { src: '/static/docs/swarm/slide-04.png', alt: 'The Genetic Code of the Swarm — seven archetypes' },
    { src: '/static/docs/swarm/slide-05.png', alt: 'The Agency Kernel: Autonomous Cognition' },
    { src: '/static/docs/swarm/slide-06.png', alt: 'Four-Tier Permanent Memory Architecture' },
    { src: '/static/docs/swarm/slide-07.png', alt: 'Decentralized Contract-Net Task Market' },
    { src: '/static/docs/swarm/slide-08.png', alt: 'T.O.A. — Temporal Optimization Agent 44' },
    { src: '/static/docs/swarm/slide-09.png', alt: 'SINAX — Geometric Proof Navigation' },
    { src: '/static/docs/swarm/slide-10.png', alt: 'Purpose-Built Revenue Pipelines — WebBuilder Swarm' },
    { src: '/static/docs/swarm/slide-11.png', alt: 'The Business Intelligence Engine' },
    { src: '/static/docs/swarm/slide-12.png', alt: 'Dual-Token Base Chain Economy — SINC and AXM' },
    { src: '/static/docs/swarm/slide-13.png', alt: 'Scale Your Autonomous Workforce — pricing tiers' },
    { src: '/static/docs/swarm/slide-14.png', alt: 'The Deployment Pipeline — 4 steps to live revenue' },
    { src: '/static/docs/swarm/slide-15.png', alt: 'The Swarm is Ready — Deploy Now' },
  ];
  let i = 0;
  const img = document.getElementById('slide');
  const bar = document.getElementById('bar');
  const counter = document.getElementById('counter');
  const thumbs = document.getElementById('thumbs');
  const buttons = slides.map((s, n) => {
    const b = document.createElement('button');
    b.type = 'button';
    b.title = 'Slide ' + (n + 1);
    b.innerHTML = '<img src="' + s.src + '" alt="">';
    b.onclick = () => show(n);
    thumbs.appendChild(b);
    return b;
  });
  function show(n) {
    i = (n + slides.length) % slides.length;
    img.src = slides[i].src;
    img.alt = slides[i].alt;
    bar.style.width = ((i + 1) / slides.length * 100) + '%';
    counter.textContent = (i + 1) + ' / ' + slides.length;
    buttons.forEach((b, j) => b.classList.toggle('active', j === i));
    buttons[i].scrollIntoView({ inline: 'center', block: 'nearest', behavior: 'smooth' });
  }
  document.getElementById('prev').onclick = () => show(i - 1);
  document.getElementById('next').onclick = () => show(i + 1);
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); show(i + 1); }
    if (e.key === 'ArrowLeft') show(i - 1);
  });
  let tx = 0;
  document.getElementById('stage').addEventListener('touchstart', e => { tx = e.changedTouches[0].screenX; });
  document.getElementById('stage').addEventListener('touchend', e => {
    const dx = e.changedTouches[0].screenX - tx;
    if (Math.abs(dx) > 50) show(dx < 0 ? i + 1 : i - 1);
  });
  show(0);
})();
</script>
</body>
</html>
