frameworks:
  - id: HBPC
    name: Hook-Benefit-Proof-CTA
    hooks:
      - "Tired of pet hair & odors?"
      - "Driving clients tomorrow? Make the first impression count."
      - "Embarrassed by coffee stains on the seats?"
      - "Your car’s interior doesn’t have to smell like yesterday."
      - "Fleet looking rough? We’ll reset it today."
      - "Want your ride to feel new again?"
      - "Dog hair everywhere? Let us fix it."
      - "Smells that won’t go away? We can."
      - "Don’t waste weekends scrubbing—book today."
      - "Fast, pro detailing that keeps your car in the game."
