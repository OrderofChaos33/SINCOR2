      - "Book now: https://clintondetailing.com/book · +1 (563) 555-1234"
      - "Tap to reserve your slot: https://clintondetailing.com/book"
      - "Call today for fast booking: +1 (563) 555-1234"
      - "Schedule now—spots fill fast: https://clintondetailing.com/book"
      - "Get your ride reset today—book online."
      - "Easy booking, one click away: clintondetailing.com/book"
      - "DM us now or call +1 (563) 555-1234"
      - "Your clean car is waiting—reserve now."
      - "Tap the link, drive fresh tomorrow."
      - "One call, one clean: +1 (563) 555-1234"

personas:
  business_owner:
    tone: "professional, efficient, cost-aware"
