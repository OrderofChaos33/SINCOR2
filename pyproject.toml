[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "ptn"
version = "1.0.0"
description = "Proof Topology Navigator (PTN) - A differential-geometric framework for automated theorem proving."
readme = "README.md"
requires-python = ">=3.10"
license = {text = "MIT"}
authors = [
    {name = "OrderofChaos33"}
]
keywords = ["theorem-proving", "lean4", "differential-geometry", "machine-learning", "topology"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
]

dependencies = [
    "Flask>=3.0.0,<4.0.0",
    "requests>=2.31.0",
    "PyJWT>=2.8.0",
    "Jinja2>=3.1.0",
    "PyYAML>=6.0",
    "python-dotenv>=1.0.0",
    "numpy>=1.24.0",
    "flask-jwt-extended>=4.7.0",
    "pydantic[email]>=2.0.0",
    "email-validator>=2.0.0",
    "flask-limiter>=3.8.0",
    "anthropic>=0.69.0",
    "gunicorn>=21.0.0",
    "psutil>=5.9.0",
    "Werkzeug>=3.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "pytest-cov>=4.0.0",
    "black>=23.0.0",
    "isort>=5.12.0",
    "flake8>=6.0.0",
    "mypy>=1.0.0",
    "ruff>=0.6.0",
    "pip-audit>=2.7.0",
]
redis = [
    "redis>=5.0.0",
]
docs = [
    "sphinx>=6.0.0",
    "sphinx-rtd-theme>=1.2.0",
]

[project.urls]
Homepage = "https://github.com/OrderofChaos33/SINCOR2"
Repository = "https://github.com/OrderofChaos33/SINCOR2.git"
Documentation = "https://github.com/OrderofChaos33/SINCOR2"
Issues = "https://github.com/OrderofChaos33/SINCOR2/issues"

[project.scripts]
sincor2 = "sincor2.app:main"
ptn = "sincor2.app:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.black]
line-length = 100
target-version = ['py39', 'py310', 'py311', 'py312', 'py313']
include = '\.pyi?$'
extend-exclude = '''
/(
  # directories
  \.eggs
  | \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | build
  | dist
)/
'''

[tool.isort]
profile = "black"
line_length = 100
multi_line_mode = 3
include_trailing_comma = true
force_grid_wrap = 0
use_parentheses = true
ensure_newline_before_comments = true

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests/pytest"]
python_files = ["test_*.py"]
addopts = "-ra"

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I"]

[tool.mypy]
python_version = "3.9"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false
disallow_incomplete_defs = false
check_untyped_defs = false
