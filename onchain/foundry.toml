[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc = "0.8.26"
optimizer = true
optimizer_runs = 200
via_ir = true
evm_version = "cancun"
gas_reports = ["SincBondingCurve", "SincLimitOrderHook", "SincTreasuryLadderHook", "SincHookRouter", "SincGenesisNFT"]
fs_permissions = [{ access = "read-write", path = "./deployments" }]

[fuzz]
runs = 1000

[invariant]
runs = 100
depth = 50

[rpc_endpoints]
base = "${BASE_RPC_URL}"
sepolia = "${BASE_SEPOLIA_RPC_URL}"

# [etherscan] section disabled — using sourcify verifier (no key needed)
# Restore for forge script --verify once a real Etherscan API token is available:
# [etherscan]
# base = { key = "${BASESCAN_API_KEY}", chain = 8453, url = "https://api.etherscan.io/v2/api" }
# sepolia = { key = "${BASESCAN_API_KEY}", chain = 84532, url = "https://api.etherscan.io/v2/api" }
