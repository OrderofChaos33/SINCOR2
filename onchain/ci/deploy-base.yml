name: deploy-base
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install libs
        working-directory: onchain
        run: |
          forge install foundry-rs/forge-std@v1.9.7 --no-commit
          forge install OpenZeppelin/openzeppelin-contracts@v4.9.6 --no-commit
          forge install Uniswap/v4-core@v4.0.0 --no-commit

      - name: Deploy vault + staging hook on Base
        working-directory: onchain
        env:
          PRIVATE_KEY: ${{ secrets.BASE_PRIVATE_KEY }}
        run: |
          echo "PRIVATE_KEY=$PRIVATE_KEY" > .env
          chmod +x script/deploy-base.sh
          ./script/deploy-base.sh

      - name: Upload broadcast receipts
        uses: actions/upload-artifact@v4
        with:
          name: broadcast-receipts
          path: onchain/broadcast/
