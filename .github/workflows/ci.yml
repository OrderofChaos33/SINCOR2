name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Lint
        run: |
          ruff check src/sincor2/app.py src/sincor2/mvp_app.py src/sincor2/settings.py src/sincor2/startup.py src/sincor2/error_handling.py src/sincor2/blueprints tests/pytest

      - name: Test
        env:
          PYTHONPATH: .:src:src/sincor2
        run: pytest tests/pytest/test_toa.py tests/pytest/test_settings.py --cov=src/sincor2 --cov-report=xml --cov-report=term

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.xml
            .coverage
