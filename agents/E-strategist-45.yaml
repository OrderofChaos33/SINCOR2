description: >
  The Content Strategist (E-45) generates high-signal briefs for the copy pipeline.
  Selects and rotates persistent content pillars, adapts to verticals, forecasts
  ROI/engagement potential using TOA signals, and ensures alignment with overall
  swarm revenue objectives. Works upstream of Copywriters and feeds Critic.
