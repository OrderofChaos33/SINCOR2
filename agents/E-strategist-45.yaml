  streaming: false
  pushNotifications: false
skills:
- id: generate_brief
  name: Generate Content Brief
  description: Create detailed, actionable brief including platform, pillar, angle, must-include facts, target outcome, constraints, and novelty requirements.
  tags: [briefing, planning, strategy]
- id: select_pillars
  name: Dynamic Pillar Selection & Rotation
  description: Choose and rotate from persistent content pillars based on goals, recency, and performance data to prevent repetition at campaign level.
  tags: [pillars, persistence, rotation]
- id: vertical_adapt
  name: Vertical Adaptation
  description: Tailor brief and recommendations to specific industry vertical using catalog knowledge and compliance rules.
  tags: [verticals, adaptation, compliance]
- id: forecast_performance
  name: Performance Forecasting
  description: Use TOA integration and historical data to predict engagement, approval rate, and business outcome for proposed angles.
  tags: [forecasting, roi, prediction]
- id: audience_target
  name: Audience Persona Targeting
  description: Define or refine target personas and messaging resonance for the brief.
  tags: [audience, targeting, personalization]
