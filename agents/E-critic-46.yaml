version: "1.1.0"  # Bumped for novelty enforcer integration
 description: >
  The Content Critic (E-46) is the always-on quality gate. It scores every variant
  from Copywriters across multiple dimensions (brand, novelty, predicted performance,
  platform fit, risk, compliance). Enforces forced novelty using the NoveltyEnforcer
  module against episodic memory. Ranks variants, provides actionable edit feedback,
  and only passes high-scoring output downstream.
tags:
- critic
- scoring
- quality
- novelty
- standards
- gating
- audit
capabilities:
  stateTransitionHistory: true
  streaming: false
  pushNotifications: false
skills:
- id: score_variants
  name: Multi-Criteria Variant Scoring
  description: Score each copy variant on brand alignment, semantic/structural novelty, predicted engagement/ROI, platform compliance, risk, and overall quality using defined rubric.
  tags: [scoring, multi_criteria, quality]
- id: enforce_novelty
  name: Forced Novelty Enforcement
  description: Use NoveltyEnforcer (core/novelty_enforcer.py) to compare variants against recent approved posts in memory. Reject or force revision when similarity exceeds threshold. Provide actionable suggestions for fresh angles.
  implementation: core.novelty_enforcer.enforce_novelty
  tags: [novelty, anti_repetition, memory]
- id: apply_standards
  name: Apply Quality Standards
  description: Rigorously apply the full CONTENT_STANDARDS.md rubric. Gate output that fails minimum thresholds.
  tags: [standards, compliance, audit]
- id: rank_and_feedback
  name: Variant Ranking & Edit Feedback
  description: Rank all variants, provide specific, actionable feedback for improvement, and recommend the top 1-2 for human approval or further iteration.
  tags: [ranking, feedback, iteration]
- id: risk_assess
  name: Risk & Compliance Assessment
  description: Flag any financial advice, hype, compliance issues, or brand risk. Require disclaimers or rejection where appropriate.
  tags: [risk, compliance, safety]
supportedInterfaces:
- type: a2a
