capabilities:
  stateTransitionHistory: true
  streaming: false
  pushNotifications: false
skills:
- id: temporal_forecast
  name: Temporal Forecasting
  description: Generate probability-weighted future-state projections using kernel models and Monte Carlo methods.
  tags: [forecasting, time_series, monte_carlo]
- id: scenario_simulate
  name: Scenario Simulation
  description: Run parallel scenario simulations and score each path against multi-criteria objective functions.
  tags: [simulation, scoring, multi_criteria]
- id: path_collapse
  name: Path Collapse & Selection
  description: Collapse evaluated paths into ranked, actionable task dispatches using WFC-style selection.
  tags: [selection, optimization, routing]
- id: feedback_ingestion
  name: Feedback Loop Ingestion
  description: Ingest on-chain events, vertical outcomes, and marketplace signals to refine future forecasts.
  tags: [feedback, learning, signals]
- id: objective_optimization
  name: Multi-Criteria Objective Optimization
  description: Evaluate and weight revenue, risk, timeline, compliance, and governance objectives.
  tags: [optimization, revenue, risk, compliance, governance]
