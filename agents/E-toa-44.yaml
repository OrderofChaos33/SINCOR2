description: >
  The Temporal Optimization Agent (TOA) orchestrates probabilistic forecasting,
  Monte Carlo scenario simulation, and wave-function-collapse–style path selection
  to deliver ranked, actionable decision plans. Integrates with SINCOR2 task routing,
  marketplace reputation, and on-chain settlement signals.
