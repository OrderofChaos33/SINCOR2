# SINC KPI-driven TGE campaign — MegaETH-style rollouts with on-chain milestones
# Pre-deposit opens July 1 · TGE / LBP priority July 7

campaign_id: sinc-tge-2026
name: SINC Genesis Campaign
predeposit_opens: "2026-07-01T00:00:00Z"
tge_date: "2026-07-07T00:00:00Z"
treasury: "0x09E2891432827D8835d2E9b83B25e2a5ba9612Ac"
sinc: "0x9C8cd8d3961F445D653713dE65C6578bE11668e7"
usdc_base: "0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913"
site: https://getsincor.com
campaign_url: https://getsincor.com/launch/campaign
buy: https://getsincor.com/sinc
predeposit_info: "Bridge USDC to Base · deposit to campaign vault · earn LBP priority + allocation multiplier"

# Prerequisite cascade — each tier unlocks the next rollout wave
prereq_cascade:
  - id: wave_0
    requires: []
    unlocks: ["predeposit_waitlist", "points_register", "social_whitelist"]
  - id: wave_1
    requires: ["milestone_predeposit_10k"]
    unlocks: ["targeted_airdrop_tier1", "farcaster_announce"]
  - id: wave_2
    requires: ["milestone_wallets_250", "milestone_predeposit_50k"]
    unlocks: ["aggregator_listing_push", "reddit_campaign", "lbp_priority_boost"]
  - id: wave_3
    requires: ["milestone_volume_100k", "milestone_social_500"]
    unlocks: ["whale_capture_active", "defi_farmer_rebalance", "tge_allocation_final"]

# On-chain + performance KPI milestones (unlock announcements & allocation pools)
milestones:
  - id: milestone_predeposit_10k
    title: "$10k pre-deposit TVL"
    metric: predeposit_usdc_total
    target: 10000
    reward: "Farcaster + Base aggregator announcement wave"
    allocation_pool_pct: 2
  - id: milestone_predeposit_50k
    title: "$50k pre-deposit TVL"
    metric: predeposit_usdc_total
    target: 50000
    reward: "Launchpad co-marketing slot unlocked"
    allocation_pool_pct: 3
  - id: milestone_wallets_250
    title: "250 qualified wallets"
    metric: qualified_wallets
    target: 250
    reward: "Social whitelist airdrop +5%"
    allocation_pool_pct: 2
  - id: milestone_volume_100k
    title: "$100k SINC gateway volume"
    metric: sinc_buy_volume_usd
    target: 100000
    reward: "Live volume milestone — DexScreener boost + LBP tier boost"
    allocation_pool_pct: 4
  - id: milestone_social_500
    title: "500 social-verified participants"
    metric: social_whitelist_count
    target: 500
    reward: "Anti-mercenary allocation gate complete"
    allocation_pool_pct: 3
  - id: milestone_predeposit_250k
    title: "$250k pre-deposit TVL"
    metric: predeposit_usdc_total
    target: 250000
    reward: "Whale tier + max LBP priority pool"
    allocation_pool_pct: 5

# Points → allocation multiplier at TGE
points_actions:
  register_wallet:
    points: 100
    requires: []
    label: "Register wallet"
  bridge_usdc:
    points: 500
    multiplier: 1.15
    requires: [register_wallet]
    label: "Bridge USDC to Base (verified tx)"
  predeposit_early:
    points: 1000
    multiplier: 1.25
    requires: [bridge_usdc]
    early_bird_before: "2026-07-03T00:00:00Z"
    early_bird_multiplier: 2.0
    label: "Pre-deposit USDC (Jul 1–7)"
  sinc_gateway_buy:
    points: 300
    multiplier: 1.1
    requires: [register_wallet]
    label: "Buy SINC via official gateway"
  social_whitelist:
    points: 400
    multiplier: 1.2
    requires: [register_wallet]
    label: "Social whitelist (X + Farcaster)"
  hook_interaction:
    points: 250
    requires: [register_wallet]
    label: "Interact with USDC hook wall"
  refer_wallet:
    points: 200
    multiplier: 1.05
    requires: [register_wallet]
    label: "Refer a qualified wallet"

# Pre-deposit tiers → LBP priority score (higher = earlier access)
predeposit_tiers:
  - id: tier_registered
    min_usdc: 0
    lbp_priority: 1.0
    label: Waitlist
  - id: tier_bronze
    min_usdc: 50
    lbp_priority: 1.25
    label: Bronze
  - id: tier_silver
    min_usdc: 500
    lbp_priority: 1.5
    label: Silver
  - id: tier_gold
    min_usdc: 5000
    lbp_priority: 2.0
    label: Gold — whale capture

# Social whitelist — hedge mercenaries
social_whitelist:
  min_points: 400
  require_channels: ["twitter", "farcaster"]
  mercenary_penalty: 0.5
  mercenary_signals:
    - no_onchain_activity_30d
    - social_only_zero_bridge
    - wallet_age_under_7d

# Whale + DeFi farmer capture
capture:
  whale_min_usdc: 5000
  whale_min_sinc_balance: 100000
  farmer_bridge_min_usdc: 10000
  farmer_social_required: true
  farmer_multiplier_cap: 1.1

# Integration announcement targets (auto-draft on milestone unlock)
announce_channels:
  - farcaster
  - reddit
  - twitter
  - balancer_discord
  - aerodrome_discord
  - dexscreener
  - geckoterminal
  - defillama
  - dune
  - base_ecosystem